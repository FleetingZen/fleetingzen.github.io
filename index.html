<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fleeting Zen — Timeless wisdom for a chaotic world.">
  <title>Fleeting Zen | Timeless Wisdom for Modern Life</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --fg:       #e8e4d9;
      --muted:    #9a9585;
      --accent:   #d4a24e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .45;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10,10,10,.3) 0%, rgba(10,10,10,.15) 40%, rgba(10,10,10,.85) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 640px;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: .04em;
      line-height: 1.1;
      color: #fff;
    }

    .hero-sub {
      margin-top: 1rem;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-style: italic;
      color: var(--muted);
      letter-spacing: .03em;
    }

    .divider {
      display: block;
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 2.5rem auto 0;
      opacity: .6;
    }

    /* ── Middle section ── */
    .mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6rem 1.5rem;
      text-align: center;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(212,162,78,.06), transparent);
    }

    .mid-img {
      width: min(220px, 50vw);
      opacity: .75;
      margin-bottom: 3rem;
    }

    .mid h2 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      max-width: 520px;
      line-height: 1.35;
    }

    .mid p {
      margin-top: 1.5rem;
      font-size: 1.15rem;
      max-width: 480px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Banner strip ── */
    .banner-strip {
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }

    .banner-strip img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      opacity: .5;
      display: block;
    }

    /* ── Bottom section ── */
    .bottom {
      padding: 5rem 1.5rem 6rem;
      text-align: center;
    }

    .bottom p {
      font-size: 1.15rem;
      max-width: 500px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
    }

    .bottom .accent-text {
      display: block;
      margin-top: 2.5rem;
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: .05em;
      font-weight: 600;
    }

    /* ── Footer ── */
    footer {
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: .85rem;
      color: var(--muted);
      opacity: .5;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    /* ── Fade-in on scroll ── */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .9s ease, transform .9s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <img src="images/tree-no-words-shorter.png" alt="" class="hero-img">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">Fleeting Zen</h1>
      <p class="hero-sub">Timeless Wisdom for Modern Life</p>
      <span class="divider"></span>
    </div>
  </section>

  <!-- Middle -->
  <section class="mid">
    <img src="images/meditating-figure.png" alt="Meditation" class="mid-img reveal">
    <h2 class="reveal">Still the noise.<br>Find what remains.</h2>
    <p class="reveal">Ancient philosophy, modern practice — tools for living with clarity, purpose, and peace.</p>
  </section>

  <!-- Banner strip -->
  <div class="banner-strip">
    <img src="images/FZ_Banner_2.png" alt="">
  </div>

  <!-- Bottom -->
  <section class="bottom">
    <p class="reveal">More is coming. Until then, sit with the silence.</p>
    <span class="accent-text reveal">— Memento Mori —</span>
  </section>

  <footer>&copy; 2025 Fleeting Zen. All rights reserved.</footer>

  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  </script>
</body>
</html>
